# Dependabot configuration — SECURITY-ONLY mode.
#
# Version updates (= "there is a newer release of X") are DISABLED via
# `open-pull-requests-limit: 0` on every ecosystem. Dependabot will NOT open
# noisy "bump foo from 1.2.3 to 1.2.4" PRs.
#
# Security updates (= "X has a published CVE, here is the patch") are NOT
# controlled by this file. They are enabled separately at:
#   Repo Settings → Code security → Dependabot → "Dependabot security updates"
# Keep that toggle ON. Those PRs will continue to arrive — they are the only
# automated PRs you actually want.
#
# Why list every ecosystem here at all if everything is disabled?
# Because Dependabot only scans ecosystems declared in this file when it
# decides where to apply security updates. Listing them with limit=0 means:
# "scan here, alert on CVEs, but do not open routine version-bump PRs".
#
# Manual audit cadence (recommended): weekly, takes ~5 minutes.
#   cd frontend && pnpm audit --prod --audit-level=high
#   cd backend  && uv run pip-audit

version: 2
updates:
  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0  # Disable version-update PRs (security PRs unaffected)
    labels:
      - "dependencies"
      - "frontend"

  # Backend — pip (reads pyproject.toml + uv.lock)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "backend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "ci"

  # Docker base images (backend)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "docker"

  # Docker base images (frontend)
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "docker"
