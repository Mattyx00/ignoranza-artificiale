name: CI & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_ignoranza_artificiale
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run Alembic migrations
        run: cd backend && uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_ignoranza_artificiale

      - name: Run tests
        run: cd backend && uv run pytest tests/ -v --tb=short
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_ignoranza_artificiale
          REDIS_URL: redis://localhost:6379
          OPENROUTER_API_KEY: test-key-for-ci
          CORS_ORIGINS: '["http://localhost:3000"]'
          HTTPS_ENABLED: "false"
          DOCS_ENABLED: "false"
          ALLOWED_HOSTS: '["localhost","127.0.0.1","testserver"]'

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Run tests
        run: cd frontend && pnpm test -- --ci --passWithNoTests

      - name: Type check
        run: cd frontend && pnpm tsc --noEmit

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    # Only deploy on push to main, not on pull requests
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/ignoranza-be:latest \
            -t ghcr.io/${{ env.OWNER }}/ignoranza-be:${{ github.sha }} \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/ignoranza-fe:latest \
            -t ghcr.io/${{ env.OWNER }}/ignoranza-fe:${{ github.sha }} \
            ./frontend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ env.OWNER }}/ignoranza-be:latest
          docker push ghcr.io/${{ env.OWNER }}/ignoranza-be:${{ github.sha }}

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ env.OWNER }}/ignoranza-fe:latest
          docker push ghcr.io/${{ env.OWNER }}/ignoranza-fe:${{ github.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger App Platform redeploy
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID_BE }}
          doctl apps create-deployment ${{ secrets.DO_APP_ID_FE }}
